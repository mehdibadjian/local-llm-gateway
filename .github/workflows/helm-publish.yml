name: Publish Helm Charts
on:
  push:
    tags:
      - 'helm-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Package and push Helm charts
        run: |
          mkdir -p /tmp/charts
          
          # Package all charts
          for chart_dir in deploy/helm/*/; do
            if [ -f "${chart_dir}Chart.yaml" ]; then
              echo "Packaging chart from ${chart_dir}"
              helm package "${chart_dir}" --destination /tmp/charts/
            fi
          done
          
          # Push all packaged charts to GHCR OCI registry
          for pkg in /tmp/charts/*.tgz; do
            if [ -f "$pkg" ]; then
              name=$(basename "$pkg" .tgz)
              echo "Pushing ${name} to ghcr.io/caw/charts"
              helm push "$pkg" oci://ghcr.io/caw/charts
            fi
          done
