# CAW Redis configuration — enforces noeviction to preserve session keys
maxmemory-policy noeviction

# Disable RDB snapshots (sessions are ephemeral across restarts; history lives in-memory only)
save ""

# Disable AOF (not needed for session store; reduces latency)
appendonly no

# Bind to all interfaces when running in a container
bind 0.0.0.0

# Protect-mode off inside Kubernetes (network policies handle access control)
protected-mode no
