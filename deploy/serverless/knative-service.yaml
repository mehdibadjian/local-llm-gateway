apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: caw-wrapper
  namespace: default
  annotations:
    autoscaling.knative.dev/minScale: "0"
    autoscaling.knative.dev/maxScale: "10"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containers:
      - name: caw-wrapper
        image: ghcr.io/caw/wrapper:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CAW_SERVERLESS_MODE
          value: "knative"
        - name: PORT
          value: "8080"
        ports:
        - name: http1
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      timeoutSeconds: 300
