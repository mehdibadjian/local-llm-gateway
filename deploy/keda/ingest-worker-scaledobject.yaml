apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: caw-ingest-worker
spec:
  scaleTargetRef:
    name: caw-ingest-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
  - type: redis-streams
    metadata:
      address: redis:6379
      stream: caw:ingest:stream
      consumerGroup: caw-workers
      pendingEntriesCount: "50"
    authenticationRef:
      name: keda-trigger-auth-redis
