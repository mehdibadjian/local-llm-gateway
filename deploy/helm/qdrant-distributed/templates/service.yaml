apiVersion: v1
kind: Service
metadata:
  name: qdrant-distributed
  labels:
    app: qdrant-distributed
spec:
  clusterIP: None
  selector:
    app: qdrant-distributed
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.service.raftPort }}
    targetPort: raft
    protocol: TCP
    name: raft
