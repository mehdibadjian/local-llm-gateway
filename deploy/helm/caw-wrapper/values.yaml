replicaCount: 1

image:
  repository: caw/wrapper
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx

config:
  workerPoolSize: "10"
  redisAddr: "redis:6379"
  ollamaBaseUrl: "http://ollama:11434"
  qdrantBaseUrl: "http://qdrant:6333"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
