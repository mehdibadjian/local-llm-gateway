replicaCount: 1

image:
  repository: caw/wrapper
  tag: latest
  pullPolicy: IfNotPresent

env:
  REDIS_ADDR: "redis:6379"
  QDRANT_BASE_URL: "http://qdrant:6333"
  DATABASE_URL: "postgres://caw:caw@postgres:5432/caw?sslmode=disable"
  EMBED_BASE_URL: "http://embed-service:5000"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"
