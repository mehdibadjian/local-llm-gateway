image:
  repository: ghcr.io/caw/wrapper
  tag: latest
  pullPolicy: IfNotPresent

schedule: "0 2 * * *"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  REDIS_URL: "redis://redis:6379"
  QDRANT_BASE_URL: "http://qdrant:6333"
  DATABASE_URL: ""

successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1
