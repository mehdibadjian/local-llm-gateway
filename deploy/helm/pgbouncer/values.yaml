replicaCount: 1

image:
  repository: pgbouncer/pgbouncer
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432

# PgBouncer Configuration
# This pooler is gated on pg_stat_activity > 50
# When the number of active connections in PostgreSQL exceeds 50,
# consider enabling PgBouncer to pool connections efficiently.
pgbouncer:
  poolMode: transaction
  maxClientConn: 100
  defaultPoolSize: 25
  
  # PostgreSQL backend connection details
  postgres:
    host: postgres
    port: 5433
    user: caw
    database: caw_db

# When pg_stat_activity > 50, pgbouncer becomes critical
# Enable this deployment when you observe high connection counts
annotations:
  pg_stat_activity_threshold: "50"
  description: "PgBouncer gated on pg_stat_activity > 50 connections"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"
