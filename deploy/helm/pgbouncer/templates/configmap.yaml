apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  labels:
    app: pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    {{ .Values.pgbouncer.database }} = host={{ .Values.pgbouncer.postgres.host }} port={{ .Values.pgbouncer.postgres.port }} user={{ .Values.pgbouncer.postgres.user }}

    [pgbouncer]
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    min_pool_size = 5
    reserve_pool_size = 3
    reserve_pool_timeout = 3
    max_db_connections = 50
    max_user_connections = 50
    server_idle_timeout = 600
    server_lifetime = 3600
    server_connect_timeout = 15
    server_login_retry = 15
    client_idle_timeout = 600
    query_timeout = 0
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    admin_users = {{ .Values.pgbouncer.postgres.user }}
