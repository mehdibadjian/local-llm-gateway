version: "3.9"
services:
  wrapper:
    build: .
    ports: ["8080:8080"]
    environment:
      - REDIS_ADDR=redis:6379
      - QDRANT_BASE_URL=http://qdrant:6333
      - DATABASE_URL=postgres://caw:caw@postgres:5432/caw?sslmode=disable
      - EMBED_BASE_URL=http://embed:5000
      - OLLAMA_BASE_URL=http://ollama:11434
      - CAW_API_KEY=dev-key
      - WORKER_POOL_SIZE=10
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}
      qdrant: {condition: service_started}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: caw
      POSTGRES_USER: caw
      POSTGRES_PASSWORD: caw
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caw"]
      interval: 5s

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  embed:
    build: ./embed_service
    ports: ["5000:5000"]
    environment:
      - EMBED_CONCURRENCY=4
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s

volumes:
  ollama_data:
  pg_data:
  qdrant_data:
